<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>webhooks</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">webhooks</div>
      <div class="chaos-controls" id="chaosControls">
        <label class="chaos-toggle" for="chaosEnabled">
          <input id="chaosEnabled" type="checkbox" />
          <span class="chaos-slider" aria-hidden="true"></span>
          <span>Chaos</span>
        </label>
        <label class="chaos-rate-wrap" id="chaosRateWrap">
          <span>% fail rate</span>
          <input id="chaosRate" type="number" min="0" max="100" />
        </label>
        <span class="chaos-pulse" id="chaosPulse" aria-hidden="true"></span>
      </div>
      <div class="topbar-right">
        <button id="tunnelToggleBtn" class="btn btn-primary" type="button">Start Tunnel</button>
        <button id="tunnelUrl" class="tunnel-url" type="button" title="Copy tunnel URL">Tunnel inactive</button>
        <span id="tunnelCopyTooltip" class="copy-tooltip" role="status" aria-live="polite"></span>
      </div>
    </header>

    <main class="layout">
      <section class="panel config-panel">
        <div class="panel-header">
          <div>
            <h1 class="panel-title">Endpoint Config</h1>
            <p class="panel-subtitle">Behavior per webhook route</p>
          </div>
          <button id="resetBtn" class="btn btn-glass" type="button">Reset</button>
        </div>

        <div class="endpoint-tabs" id="endpointTabs" role="tablist" aria-label="Endpoints"></div>

        <div class="webhook-url-wrap">
          <span class="label-micro">Active Webhook URL</span>
          <code id="finalWebhookUrl" class="webhook-url"></code>
        </div>

        <form id="configForm" class="config-form">
          <section class="form-section">
            <h2>Auth</h2>
            <div class="field-grid">
              <label class="field">
                <span>Auth Type</span>
                <select id="authType" name="authType">
                  <option value="NONE">NONE</option>
                  <option value="API_KEY">API_KEY</option>
                  <option value="BEARER">BEARER</option>
                </select>
              </label>

              <label class="field auth-group" id="apiKeyHeaderGroup">
                <span>API Key Header</span>
                <input id="apiKeyHeaderName" name="apiKeyHeaderName" type="text" />
              </label>

              <label class="field auth-group" id="apiKeyValueGroup">
                <span>API Key Value</span>
                <input id="apiKeyValue" name="apiKeyValue" type="text" />
              </label>

              <label class="field auth-group" id="bearerGroup">
                <span>Bearer Token</span>
                <input id="bearerToken" name="bearerToken" type="text" />
              </label>
            </div>
          </section>

          <section class="form-section">
            <h2>Response</h2>
            <div class="field-grid three-col">
              <label class="field">
                <span>Status Code</span>
                <input id="defaultStatusCode" name="defaultStatusCode" type="number" min="100" max="599" />
              </label>

              <label class="field">
                <span>Retry Sequence</span>
                <input id="statusCodes" name="statusCodes" type="text" placeholder="503, 503, 200" />
              </label>

              <label class="field">
                <span>Delay (ms)</span>
                <input id="responseDelayMs" name="responseDelayMs" type="number" min="0" />
              </label>
            </div>
          </section>

          <section class="form-section">
            <h2>Body &amp; Headers</h2>
            <div class="field-grid split">
              <label class="field">
                <span>Response Headers (JSON)</span>
                <textarea id="responseHeaders" name="responseHeaders" rows="10"></textarea>
              </label>

              <label class="field">
                <span>Response Body</span>
                <textarea id="responseBody" name="responseBody" rows="10"></textarea>
              </label>
            </div>
          </section>

          <div class="save-row">
            <p id="saveStatus" class="save-status" aria-live="polite"></p>
            <button id="saveBtn" type="submit" class="btn btn-primary save-btn">Save Endpoint Config</button>
          </div>
        </form>

        <section class="profiles-section">
          <h2>Profiles</h2>
          <div class="profiles-actions">
            <input id="profileNameInput" type="text" placeholder="profile name" />
            <button id="saveProfileBtn" type="button" class="btn btn-glass">Save Profile</button>
          </div>
          <div id="profilesList" class="profiles-list"></div>
        </section>
      </section>

      <section class="panel logs-panel">
        <div class="panel-header logs-header">
          <div class="requests-title-wrap">
            <h1 class="panel-title">Requests</h1>
            <span id="logCount" class="count-pill">0</span>
          </div>
          <div class="logs-toolbar">
            <input id="logSearch" type="search" placeholder="Search requests..." />
            <button id="clearLogsBtn" class="btn btn-glass" type="button">Clear</button>
          </div>
        </div>
        <div id="logs" class="logs" aria-live="polite"></div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
