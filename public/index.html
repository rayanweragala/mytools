<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Webhook Mock Lab</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="20" height="20" focusable="false">
            <path fill="currentColor" d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.1 7.1 0 0 0-1.63-.94l-.36-2.54a.5.5 0 0 0-.49-.42h-3.84a.5.5 0 0 0-.49.42l-.36 2.54c-.57.23-1.12.54-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.7 8.84a.5.5 0 0 0 .12.64l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94L2.82 14.52a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .6.22l2.39-.96c.51.4 1.06.71 1.63.94l.36 2.54a.5.5 0 0 0 .49.42h3.84a.5.5 0 0 0 .49-.42l.36-2.54c.57-.23 1.12-.54 1.63-.94l2.39.96a.5.5 0 0 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58ZM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7Z"/>
          </svg>
        </span>
        <h1>Webhook Mock Lab</h1>
      </div>
      <div class="actions">
        <button id="resetBtn" class="btn secondary">Reset Config</button>
        <button id="clearLogsBtn" class="btn danger">Clear Logs</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel config-panel">
        <div class="panel-header">
          <h2>Endpoint Behavior</h2>
          <select id="endpointSelect"></select>
        </div>
        <div class="url-helper">
          <label>
            ngrok Base URL
            <input id="ngrokBaseUrl" type="text" placeholder="https://abcd-1234.ngrok-free.app" />
          </label>
          <div class="final-url-wrap">
            <span>Final Webhook URL</span>
            <code id="finalWebhookUrl">/webhook/incoming-call</code>
          </div>
        </div>

        <form id="configForm" class="form-grid">
          <label>
            Auth Type
            <select id="authType" name="authType">
              <option value="NONE">NONE</option>
              <option value="API_KEY">API_KEY</option>
              <option value="BEARER">BEARER</option>
            </select>
          </label>

          <label>
            API Key Header
            <input id="apiKeyHeaderName" name="apiKeyHeaderName" type="text" />
          </label>

          <label>
            API Key Value
            <input id="apiKeyValue" name="apiKeyValue" type="text" />
          </label>

          <label>
            Bearer Token
            <input id="bearerToken" name="bearerToken" type="text" />
          </label>

          <label>
            Status Code
            <input id="defaultStatusCode" name="defaultStatusCode" type="number" min="100" max="599" />
          </label>

          <label>
            Retry Sequence (e.g. 503,503,200)
            <input id="statusCodes" name="statusCodes" type="text" placeholder="503, 503, 200" />
          </label>

          <label>
            Response Delay (ms)
            <input id="responseDelayMs" name="responseDelayMs" type="number" min="0" />
          </label>

          <label class="wide">
            Custom Response Headers (JSON)
            <textarea id="responseHeaders" name="responseHeaders" rows="3" placeholder='{"X-Custom": "value"}'></textarea>
          </label>

          <label class="wide">
            JSON Response Body
            <textarea id="responseBody" name="responseBody" rows="8"></textarea>
          </label>

          <div class="form-actions wide">
            <button type="submit" class="btn primary">Save Endpoint Config</button>
          </div>
          <p id="saveStatus" class="save-status" aria-live="polite"></p>
        </form>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Incoming Requests</h2>
          <div class="log-actions">
            <input type="text" id="logSearch" placeholder="Filter logs..." />
            <span id="logCount" class="pill">0</span>
          </div>
        </div>
        <div id="logs" class="logs"></div>
      </section>
    </main>

    <footer class="footer">
      <code id="usageHint">POST /webhook/incoming-call | /webhook/call-answer | /webhook/call-end</code>
    </footer>

    <script src="/app.js"></script>
  </body>
</html>
